<app-header></app-header>
<div class="container">

  <h3>🛒 Carrito: {{ carrito.length }} productos</h3>

  <app-products-list 
    [productos]="productos"
    (seleccionarProducto)="productoSeleccionado($event)">
  </app-products-list>

  <div *ngIf="seleccionado" class="seleccionado">
    <h3>Producto agregado:</h3>
    <p>{{ seleccionado.nombre }} - S/ {{ seleccionado.precio }}</p>
  </div>

  <p *ngIf="carrito.length === 0">No hay productos en el carrito</p>

</div>
<app-footer></app-footer>
